<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git It Bunny</title>
  </head>
  <body>
    <form name="project-request" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="project-request" />
      <input name="bot-field" />

      <input type="text" name="name" />
      <input type="text" name="businessName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="businessType" />
      <input type="text" name="serviceNeeded" />
      <input type="text" name="packageInterestedIn" />
      <input type="text" name="budgetRange" />
      <input type="text" name="hasDomain" />
      <input type="text" name="needsBooking" />
      <input type="text" name="needsLaunchGraphics" />
      <input type="text" name="deadline" />
      <textarea name="projectDescription"></textarea>
      <input type="checkbox" name="privacyConsent" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
